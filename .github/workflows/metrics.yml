name: Languages Metrics

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  languages:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: jperez-physics

          base: header
          plugin_languages: yes
          plugin_languages_limit: 6
          plugin_languages_threshold: 3%
          plugin_languages_other: yes
          plugin_languages_details: percentage, bytes-size

          plugin_languages_ignored: >
            Jupyter Notebook, Shell, Dockerfile, Makefile,
            CMake, YAML, JSON, TOML, EditorConfig, Gitattributes

          output_action: commit
          committer_branch: main
          committer_message: '🎨 Update languages metrics [skip ci]'
